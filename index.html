              'primary': '#111111',

              'gradient-x': {
                '0%, 100%': {

                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'right center',
                },
              },
              'rotate': {
                'from': { transform: 'rotate(0deg)' },
                'to': { transform: 'rotate(360deg)' },
              },
              'gradient-bg': {
                '0%, 100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },

            }
          }
        }
